receivers:
  otlp:
    protocols:
      grpc:
        endpoint: "0.0.0.0:4317"
      http:
        endpoint: "0.0.0.0:4318"

processors:
  batch:
    timeout: 5s

exporters:
  # Metrics → Prometheus (remote_write)
  prometheusremotewrite:
    endpoint: "http://prometheus:9090/api/v1/write"
    tls:
      insecure: true

  # Traces → Grafana Tempo (OTLP)
  otlp/tempo:
    endpoint: "tempo:4317"
    tls:
      insecure: true

  # Debug logging (disable in production — see CUSTOMIZE.md)
  debug:
    verbosity: basic

service:
  pipelines:
    metrics:
      receivers:  [otlp]
      processors: [batch]
      exporters:  [prometheusremotewrite]
    traces:
      receivers:  [otlp]
      processors: [batch]
      exporters:  [otlp/tempo, debug]
