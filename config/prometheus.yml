global:
  scrape_interval: 15s
  evaluation_interval: 15s

# ── SCRAPE_TARGETS port ───────────────────────────────────────────────────────
# Add your services here. See CUSTOMIZE.md for details.
# The OTel Collector pushes metrics via remote_write — you don't need to scrape
# your OTLP services. Add scrape targets only for services that expose a
# /metrics endpoint directly (e.g. the collector itself, node_exporter).
scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: "otel-collector"
    static_configs:
      - targets: ["otel-collector:8888"]

  # Host metrics — powers the home dashboard CPU/RAM/disk panels.
  # Works on Linux. On macOS, node-exporter has limited collector support;
  # the panels will show what's available and leave the rest blank.
  - job_name: "node"
    static_configs:
      - targets: ["node-exporter:9100"]
