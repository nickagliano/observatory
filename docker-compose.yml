services:

  # ── OTel Collector ────────────────────────────────────────────────────────
  # Receives OTLP from any service (gRPC :4317, HTTP :4318).
  # Routes metrics → Prometheus, traces → Grafana Tempo.
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.102.0
    volumes:
      - ./config/otel-collector.yml:/etc/otelcol-contrib/config.yaml:ro
    ports:
      - "4317:4317"   # OTLP gRPC  — services send traces/metrics here
      - "4318:4318"   # OTLP HTTP  — alternative endpoint
    depends_on:
      - prometheus
      - tempo
    restart: unless-stopped

  # ── Prometheus ────────────────────────────────────────────────────────────
  # Receives metric remote-write from OTel Collector.
  # Also scrapes its own /metrics for self-monitoring.
  prometheus:
    image: prom/prometheus:v2.52.0
    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"   # RETENTION port — see CUSTOMIZE.md
      - "--web.enable-remote-write-receiver"   # accept remote_write from OTel Collector
      - "--web.console.libraries=/usr/share/prometheus/console_libraries"
      - "--web.console.templates=/usr/share/prometheus/consoles"
    ports:
      - "9090:9090"
    restart: unless-stopped

  # ── Grafana Tempo ─────────────────────────────────────────────────────────
  # Receives traces from OTel Collector via OTLP.
  tempo:
    image: grafana/tempo:2.5.0
    command: ["-config.file=/etc/tempo.yml"]
    volumes:
      - ./config/tempo.yml:/etc/tempo.yml:ro
      - tempo_data:/var/tempo
    ports:
      - "3200:3200"   # Tempo HTTP API (Grafana datasource)
      - "4317"        # internal OTLP gRPC from collector (not exposed to host)
    restart: unless-stopped

  # ── Node Exporter ─────────────────────────────────────────────────────────
  # Host-level metrics: CPU, RAM, disk, network — useful for every EPS.
  # Scraped by Prometheus; powers the "Host" panels in the home dashboard.
  node-exporter:
    image: prom/node-exporter:v1.8.1
    pid: host
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - "--path.procfs=/host/proc"
      - "--path.sysfs=/host/sys"
      - "--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)"
    restart: unless-stopped

  # ── Grafana ───────────────────────────────────────────────────────────────
  # Datasources auto-provisioned: Prometheus + Tempo.
  # Dashboards auto-loaded from ./dashboards/ — the DASHBOARDS port.
  grafana:
    image: grafana/grafana:11.1.0
    volumes:
      - ./config/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./dashboards:/var/lib/grafana/dashboards:ro   # DASHBOARDS port
      - grafana_data:/var/lib/grafana
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Admin"
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
    ports:
      - "9030:3000"   # Grafana UI
    depends_on:
      - prometheus
      - tempo
      - node-exporter
    restart: unless-stopped

volumes:
  prometheus_data:
  tempo_data:
  grafana_data:
