[package]
name        = "observatory"
version     = "0.1.0"
description = "Lightweight health monitoring dashboard for EPC services"
authors     = ["nickagliano"]
license     = "MIT"
platform    = ["aarch64-apple-darwin"]

[eps]
customization_guide = "CUSTOMIZE.md"

[service]
enabled      = true
start        = "HOST=$(tailscale ip -4) ./serve.sh"
port         = 9090
health_check = "GET /health"
