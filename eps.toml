[package]
name        = "observatory"
version     = "0.1.0"
description = "Self-hosted observability stack: OTel Collector → Prometheus + Grafana Tempo → Grafana"
platform    = [
  "aarch64-apple-darwin",
  "x86_64-apple-darwin",
  "x86_64-unknown-linux-gnu",
]
authors     = ["nickagliano"]
license     = "MIT"
repository  = "https://github.com/nickagliano/observatory"

[eps]
customization_guide = "CUSTOMIZE.md"
hooks_dir           = "Scripts/"

[hooks]
install = "Scripts/install.sh"

[system-dependencies]
brew = ["docker"]

[service]
enabled = true
start   = "./run.sh start"
port    = 9030
